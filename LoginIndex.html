<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="css/style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <div class="container">

        <!-- Ícone do topo -->
        <img src="img/Entar.svg" class="icone-topo" alt="Entrar">

        <!-- Título -->
        <h1>Bem-vindo de volta!</h1>

        <!-- Subtítulo -->
        <p class="subtitulo">
            Faça login para acessar sua conta.
        </p>

        <!-- Formulário -->
        <form>

            <!-- E-mail -->
            <label for="email">E-mail</label>

            <div class="campo">

                <img src="img/Email.svg" class="icone-input" alt="Email">

                <input
                    type="email"
                    id="email"
                    placeholder="Digite seu e-mail">

            </div>

            <!-- Senha -->
            <label for="senha">Senha</label>

            <div class="campo">

                <img src="img/Lock.svg" class="icone-input" alt="Senha">

                <input
                    type="password"
                    id="senha"
                    placeholder="Digite sua senha">

                <!-- Ícone do olho (opcional) -->
                <img src="img/Eye.svg" class="icone-olho" alt="Mostrar senha">

            </div>

            <!-- Esqueci a senha -->
            <p class="esqueci">
                <a href="#">Esqueceu sua senha?</a>
            </p>

            <!-- Botão -->
            <button type="submit">
                Entrar
            </button>

        </form>

        <!-- Link cadastro -->
        <p class="cadastro">

            Não tem uma conta?

            <a href="../Cadastro/cadastro.html">
                Cadastre-se
            </a>

        </p>

    </div>

</body>

</html>
